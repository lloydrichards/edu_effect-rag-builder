name: bevr-app
services:
  server:
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
    environment:
      PORT: 9000
      HOST: 0.0.0.0
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: bevr-server
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    expose:
      - "9000"
    networks:
      - app-network
    depends_on:
      - chroma

  client:
    build:
      context: .
      dockerfile: ./apps/client/Dockerfile
      args:
        SERVER_URL: ${SERVER_URL:-http://localhost:9000}
    expose:
      - "80"
    networks:
      - app-network
    depends_on:
      - server

  chroma:
    image: chromadb/chroma
    ports:
      - "8000:8000"
    volumes:
      - data:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  data:
